<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=DM+Mono:wght@400&amp;display=swap');
      text { font-family: 'DM Sans', -apple-system, sans-serif; }
      .heading { font-size: 22px; font-weight: 700; fill: #e5e7eb; }
      .heading-green { font-size: 22px; font-weight: 700; fill: #34d399; }
      .lead { font-size: 13px; fill: #6b7280; }
      .box-label { font-size: 14px; font-weight: 600; fill: #e5e7eb; text-anchor: middle; }
      .box-sub { font-size: 11px; fill: #6b7280; text-anchor: middle; }
      .box-or { font-size: 10px; fill: #4b5563; font-weight: 600; text-anchor: middle; font-style: italic; }
      .tag { font-size: 9px; font-weight: 600; text-anchor: middle; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="420" rx="16" fill="#0d1117"/>

  <!-- Header -->
  <text x="40" y="42" class="heading">How They </text>
  <text x="175" y="42" class="heading-green">Fit Together</text>
  <text x="40" y="64" class="lead">A message flows through the stack. Each brick handles one layer.</text>

  <!-- User -->
  <rect x="20" y="120" width="105" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="72" y="155" class="box-label">User</text>
  <text x="72" y="173" class="box-sub">asks a question</text>

  <path d="M130 160 L148 160" stroke="#30363d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-d)"/>

  <!-- Chat UI -->
  <rect x="155" y="120" width="105" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="207" y="155" class="box-label">Chat UI</text>
  <text x="207" y="173" class="box-sub">React frontend</text>

  <path d="M265 160 L283 160" stroke="#30363d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-d)"/>

  <!-- API Server -->
  <rect x="290" y="120" width="105" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="342" y="155" class="box-label">API Server</text>
  <text x="342" y="173" class="box-sub">auth + routing</text>

  <path d="M400 160 L418 160" stroke="#30363d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-d)"/>

  <!-- Agent (red) -->
  <rect x="425" y="110" width="120" height="100" rx="10" fill="rgba(235,22,0,0.12)" stroke="#eb1600" stroke-width="1.2"/>
  <rect x="452" y="116" width="66" height="18" rx="9" fill="#eb1600"/>
  <text x="485" y="129" class="tag" fill="#ffffff">AGENT</text>
  <text x="485" y="155" class="box-label">LangGraph</text>
  <text x="485" y="173" class="box-sub">LLM reasons</text>
  <text x="485" y="187" class="box-sub">&amp; routes</text>

  <path d="M550 160 L568 160" stroke="#30363d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-d)"/>

  <!-- Tools column -->
  <rect x="575" y="88" width="135" height="245" rx="12" fill="rgba(235,22,0,0.06)" stroke="#eb1600" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- UC Function -->
  <rect x="587" y="98" width="111" height="56" rx="8" fill="rgba(235,22,0,0.1)" stroke="#eb1600" stroke-width="1"/>
  <text x="642" y="121" class="box-label" style="font-size:12px">UC Function</text>
  <text x="642" y="139" class="box-sub" style="font-size:10px">precise queries</text>

  <text x="642" y="168" class="box-or">or</text>

  <!-- Genie MCP -->
  <rect x="587" y="178" width="111" height="56" rx="8" fill="rgba(235,22,0,0.1)" stroke="#eb1600" stroke-width="1"/>
  <text x="642" y="201" class="box-label" style="font-size:12px">Genie MCP</text>
  <text x="642" y="219" class="box-sub" style="font-size:10px">NL &#8594; SQL</text>

  <text x="642" y="248" class="box-or">or</text>

  <!-- KA Agent -->
  <rect x="587" y="258" width="111" height="56" rx="8" fill="rgba(235,22,0,0.1)" stroke="#eb1600" stroke-width="1"/>
  <text x="642" y="281" class="box-label" style="font-size:12px">KA Agent</text>
  <text x="642" y="299" class="box-sub" style="font-size:10px">docs &amp; PDFs</text>

  <path d="M715 160 L743 160" stroke="#30363d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-d)"/>

  <!-- Delta Tables (green) -->
  <rect x="750" y="120" width="120" height="80" rx="10" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="1.2"/>
  <text x="810" y="155" class="box-label">Delta Tables</text>
  <text x="810" y="173" class="box-sub">Unity Catalog</text>

  <path d="M875 160 L893 160" stroke="#30363d" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-d)"/>

  <!-- Answer (green) -->
  <rect x="900" y="120" width="120" height="80" rx="10" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="1.2"/>
  <text x="960" y="149" class="box-label">Answer</text>
  <text x="960" y="167" class="box-sub">+ Data</text>
  <text x="960" y="181" class="box-sub">streamed live</text>

  <!-- Return arrow -->
  <path d="M960 205 L960 380 L72 380 L72 205" stroke="#21262d" stroke-width="1.2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrowhead-dim-d)"/>
  <text x="520" y="398" style="font-size:11px; fill:#4b5563; text-anchor:middle; font-family:'DM Sans',sans-serif;">response streamed back to user</text>

  <!-- Arrowheads -->
  <defs>
    <marker id="arrowhead-d" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#30363d"/>
    </marker>
    <marker id="arrowhead-dim-d" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#21262d"/>
    </marker>
  </defs>
</svg>
