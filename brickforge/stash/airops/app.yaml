command: ["bash", "-c", "pip install . && node app/server/dist/index.mjs"]

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: TASK_EVENTS_URL
    value: "http://127.0.0.1:3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: AGENT_MODEL_ENDPOINT
    value: "{AGENT_MODEL_ENDPOINT}"
  - name: PROJECT_UNITY_CATALOG_SCHEMA
    value: "{PROJECT_UNITY_CATALOG_SCHEMA}"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "{DATABRICKS_WAREHOUSE_ID}"
